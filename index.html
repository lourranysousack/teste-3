<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDANOVA | Consórcios e Investimentos</title>
    <style>
        :root {
            --vnc-dark: #000000;
            --vnc-gold: #b89352; /* Dourado exato da sua logo */
            --vnc-text: #ffffff;
            --danger: #ff4d4d;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: #0a0a0a; color: #e0e0e0; margin: 0; padding: 0; }
        
        /* Header com a Logo VIDANOVA */
        .header { background-color: var(--vnc-dark); padding: 30px; text-align: center; border-bottom: 2px solid var(--vnc-gold); }
        .header img { max-width: 250px; height: auto; display: block; margin: 0 auto; }

        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }
        
        /* Grid de Categorias COM FOTOS RESTAURADAS */
        .grid-bens { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 30px; }
        .card-bem { background: #1a1a1a; border-radius: 10px; border: 1px solid #333; cursor: pointer; transition: 0.3s ease; text-align: center; overflow: hidden; height: 130px; /* Altura para caber foto e texto */ }
        
        /* Estilo das Fotos nos Quadrados */
        .card-bem img { width: 100%; height: 75px; object-fit: cover; border-bottom: 1px solid #222; filter: grayscale(20%); }
        
        /* Texto abaixo da foto */
        .card-bem span { display: block; padding: 10px 2px; font-size: 0.65rem; font-weight: 800; color: #ccc; text-transform: uppercase; height: 35px; display: flex; align-items: center; justify-content: center; letter-spacing: 1px; }
        
        /* Destaque no Dourado ao Selecionar */
        .card-bem.active { border: 2px solid var(--vnc-gold); background: #222; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(184, 147, 82, 0.2); }
        .card-bem.active span { color: var(--vnc-gold); }

        /* Inputs Estilizados */
        .main-card { background: #151515; padding: 25px; border-radius: 15px; border: 1px solid #222; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--vnc-gold); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .cur-input { position: relative; display: flex; align-items: center; }
        .cur-input::before { content: "R$"; position: absolute; left: 15px; font-weight: bold; color: var(--vnc-gold); }
        .cur-input input { width: 100%; padding: 15px 15px 15px 45px; border: 1px solid #333; border-radius: 8px; font-size: 1.2rem; background: #000; color: #fff; font-weight: bold; outline: none; }
        .cur-input input:focus { border-color: var(--vnc-gold); }

        /* Pergunta de Restrição */
        .check-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border-left: 4px solid var(--vnc-gold); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .check-box span { font-size: 0.85rem; font-weight: bold; color: #fff; }
        .toggle-btn { display: flex; gap: 8px; }
        .t-btn { padding: 8px 18px; border-radius: 5px; border: 1px solid #444; background: #111; color: #fff; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: 0.2s; }
        .t-btn.active { background: var(--vnc-gold); border-color: var(--vnc-gold); color: #000; }

        /* Comparativo de Parcelas */
        .comparison { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .res-box { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .res-box.vnc { border: 2px solid var(--vnc-gold); background: #131313; }
        .res-box h3 { margin: 0 0 15px 0; font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        
        .price { font-size: 2.1rem; font-weight: 900; margin: 10px 0; }
        .banco-price { color: var(--danger); }
        .vnc-price { color: var(--vnc-gold); }

        .status-tag { font-size: 0.65rem; font-weight: bold; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 10px; text-transform: uppercase; }
        .st-reprovado { background: var(--danger); color: #fff; }
        .st-analise { background: #333; color: #fff; }
        .st-vnc { border: 1px solid var(--vnc-gold); color: var(--vnc-gold); }

        .eco-tag { background: rgba(184, 147, 82, 0.1); color: var(--vnc-gold); padding: 12px; border-radius: 8px; font-weight: 800; font-size: 0.85rem; text-align: center; border: 1px solid var(--vnc-gold); margin-top: 15px; }

        .info-li { padding: 15px 0 0 0; list-style: none; font-size: 0.8rem; color: #888; }
        .info-li li { margin-bottom: 8px; display: flex; align-items: center; }
        .info-li li::before { content: "•"; color: var(--vnc-gold); font-weight: bold; margin-right: 8px; }

        /* Footer CTA */
        .footer-cta { background: var(--vnc-gold); padding: 35px; border-radius: 15px; margin-top: 30px; text-align: center; color: #000; }
        .footer-cta h3 { margin-bottom: 20px; text-transform: uppercase; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; }
        .footer-cta input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: none; box-sizing: border-box; font-weight: bold; font-size: 1rem; color: #333; }
        .btn-final { background: #000; color: var(--vnc-gold); border: none; padding: 20px; width: 100%; border-radius: 8px; font-size: 1rem; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }

        @media (max-width: 600px) { .grid-bens { grid-template-columns: repeat(3, 1fr); gap: 8px; } .card-bem { height: 110px; } .card-bem img { height: 60px; } .price { font-size: 1.7rem; } }
    </style>
</head>
